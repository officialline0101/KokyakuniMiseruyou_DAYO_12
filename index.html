<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約フォーム</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* 右端の細いナビ（固定） */
        .side-nav {
            position: fixed;
            /* 画面スクロールしても固定 */
            right: -5px;
            /* さらに右へ */
            top: 80%;
            /* 画面中央に固定 */
            transform: translateY(-50%) translateX(16px);
            /* 中央配置と右ずらし */
            background: #9bc9d6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
            width: 35px;
            /* さらに細く */
        }

        .side-nav a:active {
            transform: scale(1.0);
            /* タップした後に元のサイズに戻す */
        }

        .side-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 10px;
            margin: 5px 0;
            padding: 5px;
            transition: background 0.3s, transform 0.2s;
            border-radius: 5px;
            width: 30px;
            height: 30px;
            text-align: center;
        }

        .side-nav a span {
            font-size: 24px;
            /* 矢印をさらに大きく */
            position: absolute;
            left: 2px;
            /* 左端に寄せる */
            top: 13px;
            /* さらに下へ */
        }

        /* スマホ用の微調整 */
        @media (max-width: 600px) {
            .side-nav {
                right: 2px;
                /* スマホではさらに右端に */
                width: 30px;
                /* もっと細く */
            }

            .side-nav a {
                width: 28px;
                height: 28px;
            }

            .side-nav a i {
                font-size: 12px;
                /* スマホではもっと小さく */
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 5px;
            overflow-x: hidden;
        }

        .container {
            background-color: #fdfdfd;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 96%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
            margin: 0 auto;
        }

        h1 {
            background: linear-gradient(135deg, #9bc9d6, #6aafc0);
            color: white;
            padding: 20px;
            border-radius: 0 0px 0px 0px;
            text-align: center;
            display: block;
            margin: -20px -15px 20px -15px;
            font-size: 26px;
            font-weight: 100;
            box-shadow: inset 0 -5px 10px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .label {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            font-weight: 400;
            background-color: #9bc9d6;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 20px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            /* 上の線 */
            border-bottom: 1px solid black;
            /* 下の線 */
        }

        .labeltyuuou {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            background-color: #9bc9d6;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            /* 上の線 */
            border-bottom: 1px solid black;
            /* 下の線 */
        }

        .labelContent {
            display: block;
            margin-bottom: 10px;
            padding: 3px;
            font-weight: 400;
            background-color: #ffffff;
            color: rgb(20, 20, 20);
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            /* 上の線 */
            border-bottom: 1px solid black;
            /* 下の線 */
        }

        /* 必須マークのスタイル */
        .required {
            color: red;
            font-weight: bold;
            margin-left: 5px;
        }

        .required-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #9bc9d6;
            font-weight: bold;
            font-size: 0.9em;
            border-radius: 4px;
            padding: 2px 6px;
            border: 2px solid #9bc9d6;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #555555;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;

            /* 以下を追加 */
            position: relative;
            top: -5px;
            /* ← 上に5pxずらす（数値調整OK） */
        }

        .visit-buttons,
        .symptoms,
        .menu-sections,
        .irradiations {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .visit-buttons button,
        .symptoms button,
        .menu-sections button,
        .irradiations button {
            flex: 1;
            padding: 10px;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            background-color: #f7f7f7;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .visit-buttons button.active,
        .symptoms button.active,
        .menu-sections button.active,
        .irradiations button.active {
            background-color: #ffffff;
            color: #141414;
        }

        .date-inputs input[type="datetime-local"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 4px;
            background-color: #ff4c4c;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .calendar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        .calendar {
            flex: 1;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
        }

        .calendar table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            /* セル幅を均等にする */
        }

        .calendar th,
        .calendar td {
            font-size: 12.5px;
            /* ここでフォントサイズを変更 */
            text-align: center;
            padding: 5px;
            cursor: pointer;
            vertical-align: top;
            width: auto;
            /* 通常のセルは自動調整 */
            box-sizing: border-box;
            border: 1px solid #1a1a1a;
        }

        .calendar th:first-child,
        .calendar td:first-child {
            width: 17%;
            /* ここで時間列の幅を調整 */
            font-size: 12.5px;
            /* フォントサイズを変更 */
        }

        .calendar th {
            background-color: #f7f7f7;
        }

        .calendar td:hover {
            background-color: #ddd;
        }

        .calendar td.selected {
            background-color: #3e3f41;
            color: #fff;
        }

        .week-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .week-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .week-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
        }

        .week-button:active {
            transform: scale(0.95);
        }

        .month-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .month-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .month-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
        }

        .month-button:active {
            transform: scale(0.95);
        }

        .current-month {
            font-size: 16px;
            font-weight: 300;
            color: #3e3f41;
            margin-top: 20px;
            /* 下にずらす */
            display: inline-block;
            /* margin-top を適用しやすくする */
        }

        .loading-spinner {
            position: fixed;
            /* 画面全体に対応 */
            top: 50%;
            /* 縦中央 */
            left: 50%;
            /* 横中央 */
            transform: translate(-50%, -50%);
            display: none;
            /* 初期状態は非表示 */
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            /* 半透明の黒背景で注目度アップ */
            padding: 40px;
            /* 周囲に余白をつける */
            border-radius: 10px;
            /* 角丸で柔らかい印象 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            /* 少し立体感を追加 */
        }

        .spinner {
            width: 60px;
            /* スピナーをさらに大きく */
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            /* 薄い白で枠を柔らかく */
            border-top-color: #00d1ff;
            /* 明るい青で目立たせる */
            border-radius: 50%;
            /* 丸い形状 */
            animation: spin 0.7s linear infinite;
            /* 滑らかで速い回転 */
            margin-left: 12px;
            /* スピナーを右にずらす */
        }

        .loading-text {
            margin-top: 20px;
            /* スピナーとテキストの間隔 */
            font-size: 15px;
            /* さらに大きなフォントサイズ */
            font-weight: bold;
            /* 太字で目立たせる */
            color: #ffffff;
            /* 純白で高いコントラスト */
            letter-spacing: 1px;
            /* 文字間隔を広げてモダンな印象に */
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            /* テキストに影をつけて視認性アップ */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .available {
            color: red;
        }

        .unavailable {
            background-color: #d3d3d3;
        }

        .menu-section {
            display: none;
        }

        .menu-section.active {
            display: block;
        }

        #repairLabel,
        #repairButtons {
            display: none;
        }

        #treatment-text {
            background-color: #f9f9f9;
            padding: 16px 20px;
            border: 1px solid #000000;
            border-top: none;
            /* ← 上の横線を非表示 */
            border-radius: 0 0 3px 3px;
            /* ← 上の角の丸みをなくして自然に */
            margin-top: -13px;
            /* ← 少し上に詰める */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            font-size: 15px;
            line-height: 1.6;
            color: #000000;
        }

        .highlight-background {
            background-color: #f9f9d6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            margin-top: 10px;
            /* 上に余白を追加 */
            text-align: center;
            /* コンテナ内の要素を中央に配置 */
        }

        .red-circle {
            color: red;
            /* 赤色に設定 */
        }

        .bold-cross {
            font-weight: bold;
            /* 太文字に設定 */
        }

        .info-text {
            position: relative;
            /* ← 上下移動を有効にする */
            top: -20px;
            /* ← 上に8pxずらす（数値調整可） */
            margin-top: 0;
            /* ← 上のマージンは0にしておくと自然 */
            margin-bottom: 0px;
            font-size: 13px;
            color: #000000;
            line-height: 1.5;
            text-align: center;
            word-wrap: break-word;
            background-color: #f3f3f3;
            padding: 0px;
            border-radius: 0 0 4px 4px;
            border: 1px solid black;
            border-top: none;
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .info-text {
                font-size: 11.5px;
                top: -20px;
                /* ← モバイルでは少し控えめに上にずらす */
                line-height: 2.0;
            }
        }

        .symptoms,
        .options {
            display: block;
            /* ボタンを縦並びに */
        }

        .symptoms button,
        .options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #000000;
            border-radius: 4px;
            background-color: #ffffff;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .symptoms button.active,
        .options button.active {
            background-color: #ffffff;
            color: #000000;
        }

        .highlight-background {
            cursor: pointer;
            background-color: #9bc9d6;
            padding: 10px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .symptoms,
        .options {
            display: block;
            /* ボタンを縦並びに */
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -6px 0;
        }

        hr {
            margin: -5px 0;
        }

        .edit-button {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
            /* 改行を防ぐ */
            width: auto;
            text-align: center;
        }

        .edit-button:hover {
            background-color: #9bc9d6;
            color: #ffffff;
        }

        /* 100点の予約フォームCSS */

        input:focus,
        textarea:focus {
            border-color: #9bc9d6;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #3e3f41;
            color: #000000;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #e9e9e9;
            transform: scale(1.05);
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #9bc9d6;
            margin-top: 12px;
            /* ← ここで下方向にずらす */
        }

        .submit-button:hover {
            background-color: #6aafc0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            input,
            button {
                font-size: 14px;
            }
        }

        button.active {
            outline: 1px solid #2b2b2b;
            /* ここで枠線を指定 */
            outline-offset: 2px;
    /* 外側に色を追加 */
    box-shadow: 0 0 0 3px #9bc9d6
        }

        /* 必須マークのスタイル */
        .required {
            color: #ffffff;
            /* ゴールド（黄色） */
            font-weight: lighter;
            /* 文字を細くする */
            font-size: 0.6em;
            margin-left: 5px;
            vertical-align: 0.8em;
            /* 位置を少し上に調整 */

            /* 白色背景の四角形 */
            background-color: rgb(255, 15, 15);
            padding: 0 5px;
            border-radius: 3px;
            margin-right: 5px;
        }

        .current-month {
            text-align: center;
            display: block;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -10px);
            /* Y方向に上げる */
            background-color: #3e3f41;
            color: #fff;
            padding: 3px 12px;
            /* ボックスのパディングを縮小 */
            border-radius: 8px;
            /* 角の丸みを少し減少 */
            font-size: 1.4rem;
            /* フォントサイズを小さく */
            font-weight: 300;
            box-shadow: 0 2px 6px rgba(47, 103, 167, 0.2);
            /* 影も控えめに */
        }

        /* ナビゲーションバー */
        .sidebar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #1e1e2d;
            padding: 10px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            background: #4a90e2;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .sidebar a:hover {
            background: #357ac4;
        }

        /* スクロール用のセクション */
        .section {
            padding: 50px 10px;
            margin-top: 30px;
        }

        .repeat-booking-wrapper {
            text-align: center;
            margin: 20px 0;
        }

        #repeatBookingButton {
            background-color: #f7f7f7;
            color: #000000;
            border: 1px solid #000000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }

        #repeatBookingButton:hover {
            background-color: #f1f1f1;
            color: #000000;
        }

        /* 組み合わせ選択の案内 */
        .combine-hint {
            font-size: 13px;
            color: #d13b3b;
            text-align: center;
            line-height: 1.5;
            margin: -10px 0 14px;
        }

        /* 選択中メニューのナビ表示エリア */
        .selection-nav {
            background-color: #f4fafb;
            border: 1px solid #9bc9d6;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        .sel-nav-title {
            font-size: 14px;
            font-weight: 600;
            color: #3e6b74;
            margin-bottom: 8px;
        }

        .sel-chip-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sel-chip {
            display: inline-flex;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #9bc9d6;
            border-radius: 16px;
            padding: 5px 8px 5px 10px;
            font-size: 13px;
            color: #222;
            line-height: 1.3;
        }

        .sel-chip-cat {
            background-color: #9bc9d6;
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            border-radius: 10px;
            padding: 1px 7px;
            margin-right: 6px;
            white-space: nowrap;
        }

        .sel-chip-x {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 7px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #eef4f5;
            color: #6a8b92;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .sel-chip-x:hover {
            background-color: #ff4c4c;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <!-- 右側の追従ナビ -->
    <div class="side-nav" id="sideNav">
        <a href="#section-message">
            <span>⇩</span>
            <i class="fas fa-comment"></i>
        </a>
    </div>

    <div class="container">
        <h1><span style="font-size: 1em; font-weight: 300; display: block; letter-spacing: 0.05em;">ヘアーサロン ヤング</span>エイジングケアサロンcoco<br>予約フォーム
        </h1>
        <!-- 追加するボタン -->
        <div class="repeat-booking-wrapper">
            <button type="button" id="repeatBookingButton" onclick="applyPreviousSelection()">
                🔁 前回と同じメニューで予約する
            </button>
        </div>

        <div class="label">お客様名<span class="required">必須</span></div>

        <input type="text" id="name" placeholder="お名前を入力してください" oninput="saveInput('name')">

        <div class="label">電話番号<span class="required">必須</span></div>
        <input type="tel" id="phone" placeholder="電話番号を入力してください" oninput="saveInput('phone')">

        <div class="label">ご来店回数<span class="required">必須</span></div>
        <div class="visit-buttons">
            <button type="button" id="firstVisit" onclick="selectVisit(this)">1回目</button>
            <button type="button" id="repeatVisit" onclick="selectVisit(this)">2回目以降</button>
        </div>

        <div class="label" id="course">メニューをお選びください<span class="required">必須</span></div>

        function laneOfTitle(title) {

            const t = (title || '').trim();
            if (!t) return false;
            if (t === '営業日') return false;       // 営業日マーカーは対象外
            if (t.indexOf('予約') === 0) return false; // お客様の予約イベントは対象外
            const KEYWORDS = ['臨時休業', '休業', '定休', 'お休み', '休み', '休日'];
            return KEYWORDS.some(function (kw) { return t.indexOf(kw) !== -1; });
        }

        // 指名欄のあるメニュー（メンズ・メンズヘッドスパ）は selectedShimei に従う。
        // 指名欄の無いメニュー（レディース・ヤング・トリートメント・メンズフェイシャル）は由紀レーン。
        function getDesiredLane() {
            if (selectedShimei && selectedShimei.indexOf('博之') !== -1) return 'hiroyuki';
            if (selectedShimei && selectedShimei.indexOf('由紀') !== -1) return 'yuki';
            if (selectedShimei && selectedShimei.indexOf('指名なし') !== -1) return 'either';
            return 'yuki';
        }

        function isRoomTitle(title) {

        // ヘッドスパ・レディース・ヤングの各メニュー、およびメンズのヘッドスパオプションが対象。
        function isRoomSelection() {
            // 複数選択時：メニュー名キーワードで判定（gas.gs の複数選択時判定と一致）
            if (selectedItems.length > 1) {
                const hitByName = selectedItems.some(it => ROOM_MENU_KEYWORDS.some(kw => it.name.indexOf(kw) !== -1));
                if (hitByName) return true;
                if (irradiationsCount && irradiationsCount.indexOf('ヘッドスパ') !== -1) return true;
                return false;
            }
            // 単一選択時：従来どおりカテゴリ判定（gas.gs の isRoomCourse と一致）
            if (currentCategory === 'menshead' || currentCategory === 'ladies' || currentCategory === 'young') return true;
            if (irradiationsCount && irradiationsCount.indexOf('ヘッドスパ') !== -1) return true;
            return false;

        // 複数選択時の最終受付（開始できる最終時刻・分）。選択メニューの中で最も早い（最も厳しい）値を採用。
        // 全カテゴリのバケットを名称で横断検索するため、コース名に依存しない。該当が無ければ null。
        function getCombinedLastAcceptanceMinutes(names, isWeekend) {
            let min = null;
            (names || []).forEach(name => {
                Object.keys(lastAcceptanceTimes).forEach(cat => {
                    const entry = lastAcceptanceTimes[cat][name];
                    if (entry) {
                        const v = isWeekend ? entry.weekend : entry.weekday;
                        if (min === null || v < min) min = v;
                    }
                });
            });
            return min;
        }

        // 選択中メニューの最終受付（開始できる最終時刻・分）を返す。該当が無ければ null。
        function getLastAcceptanceMinutes(category, menuLabel, isWeekend) {
            if (!category || !menuLabel) return null;
            const byCategory = lastAcceptanceTimes[category];
            if (!byCategory) return null;
            const entry = byCategory[menuLabel];
            if (!entry) return null;
            return isWeekend ? entry.weekend : entry.weekday;
        }

                phone: document.getElementById('phone').value.trim(),
                visitCount: visitCount,
                selectedMenu: selectedMenu,
                selectedSymptom: selectedSymptom && selectedSymptom.length > 0 ? selectedSymptom : null, // 空の選択肢をチェック
                irradiationsCount: irradiationsCount,
                dates: selectedFullDate ? [selectedFullDate] : null, // 空チェック
                message: document.getElementById('message').value.trim()
            };

            // フォームデータのチェック
            if (!formData.name) {
                alert('お名前を入力してください。');
                return;
            }

            if (!formData.phone) {
                alert('電話番号を入力してください。');
                return;
            }

            if (!formData.selectedSymptom) {
                alert('メニューを選択してください。');
                return;
            }

            if (!formData.dates) {
                alert('希望日時を選択してください。');
                return;
            }

            // メンズメニューは担当指名が必須
            if (currentCategory === 'mens' && !selectedShimei) {
                alert('担当指名を選択してください。');
                return;
            }

            // 担当指名のテキスト（メンズメニューの場合のみ追加）
            const shimeiLine = selectedShimei ? `\n担当指名：${selectedShimei}` : '';

            // メニュー行（複数選択はカンマ区切り）とオプション行を分離。
            // ※オプションを別行にするのは、メニュー本体とオプションで名称が重複するメニューがあり、
            //   1行にまとめると gas.gs 側で時間計算が誤るのを防ぐため。
            const menuLine = `\nメニュー：${formData.selectedSymptom.join(',')}`;
            const optionLine = formData.irradiationsCount ? `\nオプション：${formData.irradiationsCount}` : '';

            // LINEトークにメッセージを送信
            liff.sendMessages([{
                type: 'text',
                text: `【予約フォーム】\nお名前：${formData.name}\n電話番号：${formData.phone}\nご来店回数：${formData.visitCount}\nコース：${formData.selectedMenu}${shimeiLine}${menuLine}${optionLine}\n希望日時：\n ${formData.dates[0]}\nメッセージ：${formData.message}`
            }]).then(() => {
                /* メッセージ送信成功時の処理 */
                alert('当日キャンセルは無いようにお願いいたします。');
                /* LIFFウィンドウを閉じる */
                liff.closeWindow();
            }).catch((err) => {
                /* メッセージ送信失敗時の処理 */
                console.error('メッセージの送信に失敗しました', err);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${('0' + (date.getMonth() + 1)).slice(-2)}月${('0' + date.getDate()).slice(-2)}日 ${('0' + date.getHours()).slice(-2)}:${('0' + date.getMinutes()).slice(-2)}`;
        }

        async function fetchAvailability(date) {
            // 描画基準日を確定（描画はグローバルの currentDate ではなくこの日付に従う）
            const refDate = new Date(date);
            const startTime = new Date(date);
            const endTime = new Date(date);
            endTime.setDate(endTime.getDate() + 7);

            const cacheKey = startTime.toISOString() + endTime.toISOString();

            // このフェッチのリクエストIDを採番（古いレスポンスの上書きを防ぐ）
            const requestId = ++latestRequestId;

            // キャッシュを確認（取得済みなら即時・同期で描画）
            if (availabilityCache[cacheKey]) {
                console.log('Using cached data');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays, refDate);
                return;
            }

            // 同じ週へのリクエストが既に飛んでいれば、その通信を共有する。
            // （メニュー・訪問回数・オプション選択などで fetchAvailability が連続して呼ばれても、
            //  ネットワーク呼び出しは1回だけにし、待ち時間を短縮する）
            let fetchPromise = inFlightFetches[cacheKey];
            if (!fetchPromise) {
                const url = 'https://script.google.com/macros/s/AKfycbzr3bAMCTs5bwoZAtuU73u_iIl91kHnoVQvxngI-xIHwgvoCAGAcIfOUtlWlU2RRyMw/exec' +
                    `?startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`;

                fetchPromise = (async () => {
                    const response = await fetch(url);
                    const data = await response.json();
                    console.log(data);

                    // 営業日の情報を抽出
                    const businessDays = data.filter(event => event.summary === "営業日").map(event => {
                        return {
                            start: new Date(event.startTime),
                            end: new Date(event.endTime)
                        };
                    });

                    // データをキャッシュに保存
                    availabilityCache[cacheKey] = { availability: data, businessDays: businessDays };
                    return availabilityCache[cacheKey];
                })();

                inFlightFetches[cacheKey] = fetchPromise;
                // 完了後はin-flight管理から外す（成功・失敗どちらでも）
                fetchPromise.catch(() => {}).then(() => { delete inFlightFetches[cacheKey]; });
            }

            try {
                showLoadingSpinner(); // Show loading spinner
                const result = await fetchPromise;

                // より新しいフェッチが後から飛んでいたら、この古い結果では描画しない
                if (requestId !== latestRequestId) {
                    console.log('Stale response ignored');
                    return;
                }

                updateCalendar(result.availability, result.businessDays, refDate);
            } catch (error) {
                console.error('Error fetching availability:', error);
            } finally {
                hideLoadingSpinner(); // Hide loading spinner
            }
        }

        function updateCalendar(availability, businessDays, refDate) {
            // refDate が渡されない場合は従来どおりグローバルの currentDate を使用
            if (!refDate) refDate = new Date(currentDate);
            const calendar = document.getElementById('calendar1');
            const table = calendar.querySelector('table tbody');

            // 30分間隔で09:00〜18:00
            const times = [
                '09:00', '09:30', '10:00', '10:30', '11:00', '11:30',
                '12:00', '12:30', '13:00', '13:30',
                '14:00', '14:30', '15:00', '15:30',
                '16:00', '16:30', '17:00', '17:30',
                '18:00', '18:30'
            ];

            if (table.rows.length === 0) {
                for (const time of times) {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);

                    for (let i = 0; i < 7; i++) {
                        const cell = document.createElement('td');
                        cell.addEventListener('click', () => selectDate(cell));
                        row.appendChild(cell);
                    }

                    table.appendChild(row);
                }
            }

            // テーブルのヘッダーを更新
            updateCalendarHeader(refDate);

            // 各セルを空白にリセットし、クラスもリセット
            for (let row of table.rows) {
                for (let i = 1; i < row.cells.length; i++) {
                    row.cells[i].textContent = '';
                    row.cells[i].removeAttribute('data-date');
                    row.cells[i].classList.remove('available', 'unavailable', 'selected');
                }
            }

            // 現在の日時を取得
            const now = new Date();

            // 3ヶ月後の日付を計算（3ヶ月内しか予約できない制限）
            const threeMonthsLater = new Date();
            threeMonthsLater.setMonth(threeMonthsLater.getMonth() + 3);

            // テーブルの内容を更新
            for (let i = 0; i < 7; i++) {
                const day = new Date(refDate);
                day.setDate(day.getDate() + i);

                let businessEventTimes = []; // 営業日のイベント時間帯を記録する配列
                let closedRanges = [];       // 休業マーカーの時間帯（部分休業はその時間帯のみ、終日休業は全枠に重なる）

                // その日の範囲（休業イベントが当日に重なるか判定するため）
                const dayStart = new Date(day); dayStart.setHours(0, 0, 0, 0);
                const dayEnd = new Date(day); dayEnd.setHours(23, 59, 59, 999);

                availability.forEach(slot => {
                    const eventStart = new Date(slot.startTime);
                    const eventEnd = new Date(slot.endTime);
                    if (eventStart.toDateString() === day.toDateString() && slot.title === "営業日") {
                        businessEventTimes.push({ start: eventStart, end: eventEnd });
                    }
                    // 休業マーカーのイベントは、その時間帯に重なる枠だけ✕にする。
                    // 終日イベント（臨時休業など）は全枠に重なるため終日✕、
                    // 時間帯付き（例：17:30-23:30の「休み」）はその時間帯の枠だけ✕になる。
                    if (isClosedDayTitle(slot.title) && eventStart < dayEnd && dayStart < eventEnd) {
                        closedRanges.push({ start: eventStart, end: eventEnd });
                    }
                });

                for (let j = 0; j < times.length; j++) {
                    const cell = table.rows[j].cells[i + 1];

                    // すでにセルが✕の場合はスキップする
                    if (cell.textContent === '✕') {
                        continue;
                    }

                    const slotStart = new Date(day);
                    slotStart.setHours(parseInt(times[j].split(':')[0]), parseInt(times[j].split(':')[1]), 0, 0);

                    const slotEnd = new Date(slotStart);
                    let menuDuration = selectedMenuTime || 10;
                    let visitDuration = selectedVisitTime || 0;
                    let irradiationsDuration = selectedirradiationsTime || 0;

                    // メニュー時間と訪問回数の時間を合計して、終了時間を設定
                    slotEnd.setMinutes(slotStart.getMinutes() + menuDuration + visitDuration + irradiationsDuration);

                    // 休業マーカーの時間帯に重なる枠は✕（部分休業対応：終日休業は全枠、時間帯付きはその時間のみ）
                    const overlapsClosed = closedRanges.some(r => slotStart < r.end && r.start < slotEnd);
                    if (overlapsClosed) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 終了時間が翌日 (0時以降) になる場合は✕に設定
                    if (slotEnd.getDate() !== slotStart.getDate()) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 受付終了（最終受付）判定
                    // メニュー別の最終受付があれば「開始時刻が最終受付を過ぎたら不可」、
                    // 無ければ従来どおり「施術終了が閉店時刻(平日18:30/土日18:00)を過ぎたら不可」
                    const isWeekend = (slotStart.getDay() === 0 || slotStart.getDay() === 6);
                    const defaultClosingMinutes = isWeekend ? (18 * 60) : (18 * 60 + 30); // 土日:18:00 / 平日:18:30
                    const slotStartMinutes = slotStart.getHours() * 60 + slotStart.getMinutes();
                    const slotEndMinutes = slotEnd.getHours() * 60 + slotEnd.getMinutes();
                    const selMenuLabel = (Array.isArray(selectedSymptom) && selectedSymptom.length > 0) ? selectedSymptom[0] : '';
                    // 複数選択時は選択メニューの中で最も早い最終受付を採用。単一選択時は従来どおりカテゴリ判定。
                    const lastStartMinutes = (selectedItems.length > 1)
                        ? getCombinedLastAcceptanceMinutes(selectedItems.map(it => it.name), isWeekend)
                        : getLastAcceptanceMinutes(currentCategory, selMenuLabel, isWeekend);
                    if (lastStartMinutes != null) {
                        if (slotStartMinutes > lastStartMinutes) {
                            cell.textContent = '✕';
                            cell.classList.add('unavailable');
                            continue;
                        }
                    } else if (slotEndMinutes > defaultClosingMinutes) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 予約は希望時刻の6時間前まで。6時間以内・過去の時間帯は×にする。
                    const SIX_HOURS_MS = 6 * 60 * 60 * 1000;
                    if (slotStart.getTime() - now.getTime() < SIX_HOURS_MS) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 3ヶ月以上先の場合は×にする
                    if (slotStart > threeMonthsLater) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 月曜日は定休日のため✕にする
                    if (slotStart.getDay() === 1) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    const isBusinessDay = businessDays.some(businessDay => {
                        const businessDayStart = new Date(businessDay.start);
                        const businessDayEnd = new Date(businessDay.end);
                        return slotStart >= businessDayStart && slotEnd <= businessDayEnd;
                    });

                    // 受付内判定に使う基準時刻。最終受付があればその時刻（開始時刻 <= 最終受付 を許可）、
                    // 無ければ閉店時刻（平日18:30 / 土日18:00）を受付終了として扱う。
                    const closingRefMinutes = (lastStartMinutes != null) ? (lastStartMinutes + 1) : defaultClosingMinutes;
                    const closingTime = new Date(day);
                    closingTime.setHours(Math.floor(closingRefMinutes / 60), closingRefMinutes % 60, 0, 0);

                    const isBusinessEventTime = businessEventTimes.some(event => {
                        // 開始（開店）は営業日イベントに従い、終了（受付終了）はHTMLの受付終了時間で判断する
                        return slotStart < closingTime && event.start < slotEnd;
                    });

                    // 重なっている既存予約（営業日イベントを除く）
                    const existingSlots = availability.filter(slot => {
                        const eventStart = new Date(slot.startTime);
                        const eventEnd = new Date(slot.endTime);
                        return eventStart < slotEnd && slotStart < eventEnd && slot.title !== "営業日";
                    });
                    const count = existingSlots.length;

                    // 既存予約を担当レーン（博之／由紀／指名なし）に分類
                    let laneH = 0, laneY = 0, laneN = 0;
                    existingSlots.forEach(slot => {
                        const lane = laneOfTitle(slot.title);
                        if (lane === 'hiroyuki') laneH++;
                        else if (lane === 'none') laneN++;
                        else laneY++; // 由紀（レディース・ヤング・由紀指名・無印を含む）
                    });

                    // 今回の予約が必要とするレーン
                    const desiredLane = getDesiredLane();

                    // カレンダー表示上の◯/✕判定（2レーン制：博之・由紀）
                    // 博之指名：博之レーンが空き かつ 合計2件未満
                    // 由紀/レディース/ヤング：由紀レーンが空き かつ 合計2件未満
                    // 指名なし：合計2件未満ならどちらかのレーンで可
                    let canShow;
                    if (desiredLane === 'hiroyuki') canShow = (laneH === 0 && count < 2);
                    else if (desiredLane === 'yuki') canShow = (laneY === 0 && count < 2);
                    else canShow = (count < 2);

                    // お部屋（ヘッドスパ・レディース・ヤング共用）は担当に関わらず同時1件まで
                    if (canShow && isRoomSelection()) {
                        const roomCount = existingSlots.filter(slot => isRoomTitle(slot.title)).length;
                        if (roomCount > 0) canShow = false;
                    }

                    // 営業日のイベント時間内に他のイベントがある場合
                    if (isBusinessEventTime && !canShow) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }
                    // 営業日のイベント時間（枠に空きがある場合）
                    else if (isBusinessEventTime) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    }
                    // 営業日で、指定されている時間以外の時間は×
                    else if (businessEventTimes.length > 0) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }
                    // 日曜日で、営業日ではない場合（祝日営業ありなので日曜も営業）
                    else if (slotStart.getDay() === 0 && !isBusinessDay && businessEventTimes.length === 0) {
                        // 祝日営業ありなので日曜も通常通り表示
                        if (!canShow) {
                            cell.textContent = '✕';
                            cell.classList.add('unavailable');
                        } else {
                            cell.textContent = '◯';
                            cell.classList.add('available');
                        }
                    }
                    // 営業日でかつ他のイベントがない場合
                    else if (isBusinessDay && count === 0) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    }
                    // それ以外の条件
                    else if (canShow) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }

                    cell.setAttribute('data-date', slotStart.toISOString());
                }
            }
        }

        function nextmonth() {

        }

        function previousmonth() {
            currentDate.setMonth(currentDate.getMonth() - 1); // 前月に移動
            currentDate.setDate(1); // 1日に設定
            fetchAvailability(currentDate);
        }

        function nextWeek() {
